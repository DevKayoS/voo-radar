name: coletar-precos

on:
  schedule:
    # 1x/dia às 11:00 UTC (~08:00 BRT). Free tier do Sky Scrapper = 100 req/mês;
    # 2 buscas/dia ≈ 60/mês, com folga. Aumentar a frequência pode estourar a cota.
    - cron: "0 11 * * *"
  workflow_dispatch: {}      # permite rodar manualmente pelo painel do Actions

permissions:
  contents: write            # necessário para dar push do histórico coletado

concurrency:
  group: coletar-precos      # evita execuções concorrentes pisando no mesmo arquivo
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Coletar preços
        run: go run ./cmd/radar
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commitar histórico
        run: |
          git config user.name "voo-radar-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos dados."
          else
            git commit -m "dados: coleta $(date -u +%FT%TZ)"
            git push
          fi
